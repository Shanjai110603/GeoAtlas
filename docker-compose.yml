version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: geoatlas_postgres
    environment:
      POSTGRES_USER: geoatlas
      POSTGRES_PASSWORD: geoatlas_secret
      POSTGRES_DB: geoatlas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geoatlas -d geoatlas"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: geoatlas_redis
    ports:
      - "6379:6379"

  meilisearch:
    image: getmeili/meilisearch:v1.3
    container_name: geoatlas_meilisearch
    environment:
      MEILI_MASTER_KEY: geoatlas_meili_master_key
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - meilidata:/meili_data

  minio:
    image: minio/minio:RELEASE.2023-09-04T19-57-37Z
    container_name: geoatlas_minio
    environment:
      MINIO_ROOT_USER: geoatlas_minio
      MINIO_ROOT_PASSWORD: geoatlas_minio_secret
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  osrm:
    image: osrm/osrm-backend:v5.27.1
    container_name: geoatlas_osrm
    ports:
      - "5000:5000"
    volumes:
      - osrmdata:/data
    command: osrm-routed --algorithm mld /data/region.osrm

  martin:
    image: ghcr.io/maplibre/martin:v0.13.0
    container_name: geoatlas_martin
    environment:
      DATABASE_URL: postgres://geoatlas:geoatlas_secret@postgres:5432/geoatlas
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: geoatlas_web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_TILE_URL: http://localhost:3001
      NEXT_PUBLIC_MINIO_URL: http://localhost:9000
    ports:
      - "4000:3000"
    depends_on:
      - martin

volumes:
  pgdata:
  meilidata:
  miniodata:
  osrmdata:
